<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SoftGrowTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo .logo-icon { font-size: 2.5rem; color: var(--cyan); display: block; }
    .auth-logo h1 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 900; margin-top: 0.5rem; }
    .auth-logo p { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem; }
    .auth-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; backdrop-filter: blur(20px); }
    .auth-box h2 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 0.5rem; color: var(--cyan); }
    .auth-box .sub { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
    .tab-group { display: flex; gap: 0; margin-bottom: 2rem; background: rgba(0,229,255,0.05); border-radius: 8px; padding: 4px; }
    .tab-btn { flex: 1; padding: 0.6rem; border: none; background: transparent; color: var(--text-secondary); font-family: var(--font-head); font-size: 0.72rem; letter-spacing: 0.08em; cursor: pointer; border-radius: 6px; transition: var(--transition); text-transform: uppercase; }
    .tab-btn.active { background: var(--cyan); color: #050d1a; font-weight: 700; }
    .submit-btn { width: 100%; padding: 0.9rem; margin-top: 0.5rem; font-size: 0.82rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--cyan); text-decoration: none; }
    .forgot { display: block; text-align: right; margin-top: -0.75rem; margin-bottom: 1rem; font-size: 0.8rem; color: var(--cyan); text-decoration: none; opacity: 0.7; }
    .forgot:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="noise-overlay"></div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">⬡</span>
        <h1>SoftGrow<span class="accent">Tech</span></h1>
        <p>Internship Management Portal</p>
      </div>
      <div class="auth-box glass-card">
        <h2>// ACCESS PORTAL</h2>
        <p class="sub">Login to your intern or admin account</p>
        <div class="tab-group">
          <button class="tab-btn active" onclick="setRole('intern')">Intern</button>
          <button class="tab-btn" onclick="setRole('admin')">Admin</button>
        </div>
        <div id="alert-container"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required/>
          </div>
          <a href="#" class="forgot">Forgot password?</a>
          <button type="submit" class="btn-primary submit-btn" id="submitBtn">
            Login →
          </button>
        </form>
      </div>
      <p class="auth-footer">Don't have an account? <a href="register.html">Register as Intern</a></p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8080/api';
    let currentRole = 'intern';

    function setRole(role) {
      currentRole = role;
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && role==='intern') || (i===1 && role==='admin')));
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<span class="spinner"></span> Logging in...';
      btn.disabled = true;
      document.getElementById('alert-container').innerHTML = '';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          const role = data.user.role;
          if(role === 'ADMIN') { window.location.href = 'admin.html'; } else { window.location.href = 'dashboard.html'; }
        } else {
          showAlert(data.message || 'Invalid credentials', 'error');
        }
      } catch (err) {
        // Demo mode fallback
        if (email === 'admin@softgrowtech.com' && password === 'admin123') {
          const demoUser = { id:1, fullName:'Admin User', email, role:'ADMIN' };
          localStorage.setItem('token', 'demo-admin-token');
          localStorage.setItem('user', JSON.stringify(demoUser));
          window.location.href = 'admin.html';
        } else if (password === 'intern123') {
          const demoUser = { id:2, fullName:'Demo Intern', email, role:'INTERN', domain:'Web Development' };
          localStorage.setItem('token', 'demo-intern-token');
          localStorage.setItem('user', JSON.stringify(demoUser));
          window.location.href = 'dashboard.html';
        } else {
          showAlert('Server offline. Use demo: admin@softgrowtech.com / admin123 or any@email.com / intern123', 'error');
        }
      }
      btn.innerHTML = 'Login →'; btn.disabled = false;
    }

    function showAlert(msg, type) {
      document.getElementById('alert-container').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }
  </script>
</body>
</html>
