<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — SoftGrowTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { width: 100%; max-width: 520px; }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo .logo-icon { font-size: 2.5rem; color: var(--cyan); display: block; }
    .auth-logo h1 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 900; margin-top: 0.5rem; }
    .auth-logo p { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem; }
    .auth-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; backdrop-filter: blur(20px); }
    .auth-box h2 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 0.5rem; color: var(--cyan); }
    .auth-box .sub { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .submit-btn { width: 100%; padding: 0.9rem; margin-top: 0.5rem; font-size: 0.82rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--cyan); text-decoration: none; }
    .step-indicator { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
    .step { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: var(--transition); }
    .step.active { background: var(--cyan); }
    @media(max-width:600px){ .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="noise-overlay"></div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">⬡</span>
        <h1>SoftGrow<span class="accent">Tech</span></h1>
        <p>Create Your Intern Account</p>
      </div>
      <div class="auth-box glass-card">
        <h2>// REGISTER AS INTERN</h2>
        <p class="sub">Join the program — fill in your details below</p>
        <div class="step-indicator">
          <div class="step active" id="step-1"></div>
          <div class="step" id="step-2"></div>
          <div class="step" id="step-3"></div>
        </div>
        <div id="alert-container"></div>
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-row">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" class="form-control" id="fullName" placeholder="John Doe" required/>
            </div>
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" class="form-control" id="phone" placeholder="+91 9876543210" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label>College / University *</label>
            <input type="text" class="form-control" id="college" placeholder="IIT Delhi, VIT Vellore..." required/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Domain *</label>
              <select class="form-control" id="domain" required>
                <option value="">Select Domain</option>
                <option value="Web Development">Web Development</option>
                <option value="Android Development">Android Development</option>
                <option value="AI / ML">AI / ML</option>
                <option value="UI/UX Design">UI/UX Design</option>
                <option value="Cloud DevOps">Cloud DevOps</option>
                <option value="Cybersecurity">Cybersecurity</option>
                <option value="Data Science">Data Science</option>
                <option value="Game Development">Game Development</option>
                <option value="Blockchain">Blockchain</option>
                <option value="Embedded Systems">Embedded Systems</option>
              </select>
            </div>
            <div class="form-group">
              <label>Internship Duration</label>
              <select class="form-control" id="duration">
                <option value="1 Month">1 Month</option>
                <option value="2 Months">2 Months</option>
                <option value="3 Months" selected>3 Months</option>
                <option value="6 Months">6 Months</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Password *</label>
              <input type="password" class="form-control" id="password" placeholder="Min 8 characters" required minlength="8"/>
            </div>
            <div class="form-group">
              <label>Confirm Password *</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required/>
            </div>
          </div>
          <button type="submit" class="btn-primary submit-btn" id="submitBtn">Create Account →</button>
        </form>
      </div>
      <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8080/api';

    // Animate steps on input
    const fields = ['fullName','phone','email','college','domain','password'];
    fields.forEach((f, i) => {
      const el = document.getElementById(f);
      if (el) el.addEventListener('input', () => {
        const filled = fields.filter(id => document.getElementById(id)?.value).length;
        const step = Math.ceil((filled / fields.length) * 3);
        document.querySelectorAll('.step').forEach((s, si) => s.classList.toggle('active', si < step));
      });
    });

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      document.getElementById('alert-container').innerHTML = '';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) { showAlert('Passwords do not match!', 'error'); return; }

      const payload = {
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        college: document.getElementById('college').value,
        domain: document.getElementById('domain').value,
        duration: document.getElementById('duration').value,
        password
      };

      btn.innerHTML = '<span class="spinner"></span> Creating account...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          showAlert('Account created! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          showAlert(data.message || 'Registration failed', 'error');
        }
      } catch {
        showAlert('Registration saved (demo mode). Redirecting...', 'success');
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
      btn.innerHTML = 'Create Account →'; btn.disabled = false;
    }

    function showAlert(msg, type) {
      document.getElementById('alert-container').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }
  </script>
</body>
</html>
